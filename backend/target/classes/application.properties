spring.application.name=Smart Campus Operations Hub
server.address=0.0.0.0
# Use the same port as your Google OAuth "Authorized redirect URI" (e.g. http://localhost:8082/login/oauth2/code/google).
server.port=${SERVER_PORT:8082}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# MySQL: set DB_USERNAME / DB_PASSWORD to match your server (Access denied = wrong user or password).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Kavya11}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.oauth2.success-redirect=${app.frontend-url}/oauth-success
app.seed.admin-email=admin@campushub.local
app.seed.admin-name=System Admin

# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in the environment or backend/.env — do not commit real secrets.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USER:your-email@gmail.com}
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8