spring.application.name=Smart Campus Operations Hub
server.address=0.0.0.0
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.oauth2.success-redirect=${app.frontend-url}/oauth-success
app.seed.admin-email=admin@campushub.local
app.seed.admin-name=System Admin

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
