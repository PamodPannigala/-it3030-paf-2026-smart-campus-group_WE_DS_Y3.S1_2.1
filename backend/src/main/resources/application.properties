spring.application.name=Smart Campus Operations Hub
server.address=0.0.0.0
server.port=8080

# MySQL: set DB_USERNAME / DB_PASSWORD to match your server (Access denied = wrong user or password).
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/campus_hub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.oauth2.success-redirect=${app.frontend-url}/oauth-success
app.seed.admin-email=admin@campushub.local
app.seed.admin-name=System Admin

